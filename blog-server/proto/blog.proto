syntax = "proto3";

package blog;

service BlogService {
	rpc Register(RegisterRequest) returns (AuthResponse);
	rpc Login(LoginRequest) returns (AuthResponse);

	rpc CreatePost(CreatePostRequest) returns (Post);
	rpc GetPost(PostID) returns (Post);
	rpc UpdatePost(CreatePostRequest) returns (Post);
	rpc DeletePost(PostID) returns (EmptyResponse);
	rpc ListPosts(ListParams) returns (PostResponse);
}

message EmptyResponse {}

message User {
	int64 id = 1;
	string username = 2;
	string email = 3;
	string password_hash = 4;
	int64 created_at = 5;
}

message Post {
	int64 id = 1;
	string title = 2;
	string content = 3;
	int64 author_id = 4;
	int64 created_at = 5;
	int64 updated_at = 6;
}

message RegisterRequest {
	string username = 1;
	string email = 2;
	string password = 3;
}

message LoginRequest {
	string username = 1;
	string password = 2;
}

message AuthUser {
	string username = 1;
	string email = 2;
}

message AuthResponse {
	string token = 1;
	AuthUser user = 2;
}

message CreatePostRequest {
	int64 id = 1;
	string title = 2;
	string content = 3;
}

message ListParams {
	int64 limit = 1;
	int64 offset = 2;
}

message PostID {
	int64 id = 1;
}

message PostResponse {
	repeated Post posts = 1;
	int64 total = 2;
	int64 limit = 3;
	int64 offset = 4;
}
